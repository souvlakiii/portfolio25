<svg xmlns="http://www.w3.org/2000/svg" width="238" height="20" role="img"
aria-label="Compute support by MiraclePlus">
  <title>Compute support by MiraclePlus</title>

  <clipPath id="r">
    <rect width="238" height="20" rx="3"/>
  </clipPath>

  <g clip-path="url(#r)">
    <rect width="126" height="20" fill="#FFFFFF"/>
    <rect x="126" width="112" height="20" fill="#007CFD"/>
  </g>

  <!-- Outer border -->
  <rect x="0.5" y="0.5" width="237" height="19" rx="2.5"
        fill="none" stroke="#D0D7DE"/>

  <!-- Divider -->
  <line x1="126" y1="1" x2="126" y2="19" stroke="#D0D7DE"/>

  <!-- Left label -->
  <text x="63" y="14" text-anchor="middle"
        fill="#24292F"
        font-family="Verdana,DejaVu Sans,sans-serif"
        font-size="11">
    Compute support
  </text>

  <!-- Keep this base64 image exactly as provided -->
  <image href="data:image/png;base64," x="135" y="4" width="16" height="12" preserveAspectRatio="xMidYMid meet"/>

  <!-- Right label -->
  <text x="191" y="14" text-anchor="middle"
        fill="#FFFFFF"
        font-family="Verdana,DejaVu Sans,sans-serif"
        font-size="11">
    MiraclePlus
  </text>
</svg>
