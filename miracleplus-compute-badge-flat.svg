<svg
  xmlns="http://www.w3.org/2000/svg"
  width="214"
  height="20"
  role="img"
  aria-label="Compute support by MiraclePlus"
>
  <title>Compute support by MiraclePlus</title>

  <clipPath id="r">
    <rect width="214" height="20" rx="3"/>
  </clipPath>

  <g clip-path="url(#r)">
    <!-- White left section -->
    <rect width="106" height="20" fill="#FFFFFF"/>

    <!-- MiraclePlus blue right section -->
    <rect x="106" width="108" height="20" fill="#007CFD"/>
  </g>

  <!-- Light border so the white section remains visible -->
  <rect
    x="0.5"
    y="0.5"
    width="213"
    height="19"
    rx="2.5"
    fill="none"
    stroke="#D0D7DE"
  />

  <!-- Divider -->
  <line
    x1="106"
    y1="1"
    x2="106"
    y2="19"
    stroke="#D0D7DE"
  />

  <!-- Left label -->
  <text
    x="53"
    y="14"
    text-anchor="middle"
    fill="#24292F"
    font-family="Verdana, DejaVu Sans, sans-serif"
    font-size="11"
  >
    Compute support
  </text>

  <!-- MiraclePlus logo -->
  <image href="data:image/png;base64," 
    x="135" y="4" width="16" height="12" preserveAspectRatio="xMidYMid meet"
    />

  <!-- Right label -->
  <text
    x="170"
    y="14"
    text-anchor="middle"
    fill="#FFFFFF"
    font-family="Verdana, DejaVu Sans, sans-serif"
    font-size="11"
  >
    MiraclePlus
  </text>
</svg>
